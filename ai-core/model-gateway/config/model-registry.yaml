# Model Registry
# Each model entry declares its capabilities, privacy level, and latency profile.
# privacy_level: private (stays on device) | internal (on-prem) | cloud (leaves network)
# latency_profile: fast (<500ms) | medium (500ms-2s) | slow (>2s)
# capabilities: chat | completion | embeddings | function_calling | vision | code

models:
  # --- Vyrex secured planner / runtime models ---
  - id: lumyn-agent
    provider: vyrex
    capabilities: [chat, completion, code]
    privacy_level: internal
    latency_profile: medium
    user_pullable: false

  - id: huggingface:mistralai/Mistral-7B-v0.1
    provider: vyrex
    capabilities: [chat, completion, code]
    privacy_level: private
    latency_profile: medium
    user_pullable: true

  - id: huggingface:meta-llama/Meta-Llama-3-8B-Instruct
    provider: vyrex
    capabilities: [chat, completion, code]
    privacy_level: private
    latency_profile: medium
    user_pullable: true

  - id: huggingface:Qwen/Qwen2.5-7B-Instruct
    provider: vyrex
    capabilities: [chat, completion, code]
    privacy_level: private
    latency_profile: medium
    user_pullable: true

  - id: huggingface:microsoft/Phi-3-medium-4k-instruct
    provider: vyrex
    capabilities: [chat, completion, code]
    privacy_level: private
    latency_profile: fast
    user_pullable: true

  # --- Local / Ollama models ---
  - id: llama3.2:3b
    provider: ollama
    capabilities: [chat, completion]
    privacy_level: private
    latency_profile: fast
    user_pullable: true

  - id: llama3.2:1b
    provider: ollama
    capabilities: [chat, completion]
    privacy_level: private
    latency_profile: fast
    user_pullable: true

  - id: llama3.1:8b
    provider: ollama
    capabilities: [chat, completion, code]
    privacy_level: private
    latency_profile: medium
    user_pullable: true

  - id: mistral:7b
    provider: ollama
    capabilities: [chat, completion, code]
    privacy_level: private
    latency_profile: medium
    user_pullable: true

  - id: codellama:7b
    provider: ollama
    capabilities: [chat, completion, code]
    privacy_level: private
    latency_profile: medium
    user_pullable: true

  - id: nomic-embed-text
    provider: ollama
    capabilities: [embeddings]
    privacy_level: private
    latency_profile: fast
    user_pullable: true

  # --- OpenAI cloud models ---
  - id: gpt-4o
    provider: openai
    capabilities: [chat, completion, function_calling, vision, code]
    privacy_level: cloud
    latency_profile: medium

  - id: gpt-4o-mini
    provider: openai
    capabilities: [chat, completion, function_calling, code]
    privacy_level: cloud
    latency_profile: fast

  - id: gpt-3.5-turbo
    provider: openai
    capabilities: [chat, completion]
    privacy_level: cloud
    latency_profile: fast

  - id: text-embedding-ada-002
    provider: openai
    capabilities: [embeddings]
    privacy_level: cloud
    latency_profile: fast

  # --- Anthropic cloud models ---
  - id: claude-3-5-sonnet-20241022
    provider: anthropic
    capabilities: [chat, completion, vision, code]
    privacy_level: cloud
    latency_profile: medium

  - id: claude-3-5-haiku-20241022
    provider: anthropic
    capabilities: [chat, completion, code]
    privacy_level: cloud
    latency_profile: fast

  - id: claude-3-opus-20240229
    provider: anthropic
    capabilities: [chat, completion, vision, code]
      latency_profile: slow

  # --- Neila — Desktop Agent Runtime (ouroboros-desktop) ---
  - id: neila-agent
    provider: neila
    capabilities: [chat, completion, code, function_calling]
    privacy_level: internal
    latency_profile: medium
    user_pullable: false
    endpoint: http://neila:8090
    description: Neila desktop agent runtime, formerly ouroboros-desktop

  # --- Ahnis — AI Memory Service (mempalace-Aya-fork) ---
  - id: ahnis-memory
    provider: ahnis
    capabilities: [embeddings]
    privacy_level: private
    latency_profile: fast
    user_pullable: false
    endpoint: http://ahnis:8091
    description: Ahnis AI memory service, formerly mempalace-Aya-fork
    privacy_level: cloud
    latency_profile: slow
