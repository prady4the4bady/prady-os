name: sandbox-images-and-e2e

on:
  workflow_call:
    inputs:
      run_arm64:
        description: "Build sandbox images on arm64 too"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-sandbox-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve sandbox base image
        uses: ./.github/actions/resolve-sandbox-base-image

      - name: Build production image
        run: docker build --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} -t vyrex-production .

      - name: Build sandbox test image (fixtures layered on production)
        run: docker build -f test/Dockerfile.sandbox --build-arg BASE_IMAGE=vyrex-production -t vyrex-sandbox-test .

      - name: Save images to tarballs
        run: |
          set -euo pipefail
          docker save vyrex-sandbox-test | gzip > /tmp/sandbox-test-image.tar.gz
          docker save vyrex-production | gzip > /tmp/isolation-image.tar.gz

      - name: Verify tarballs
        run: |
          gzip -t /tmp/sandbox-test-image.tar.gz
          gzip -t /tmp/isolation-image.tar.gz

      - name: Upload sandbox test image
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-test-image
          path: /tmp/sandbox-test-image.tar.gz
          retention-days: 1

      - name: Upload isolation image
        uses: actions/upload-artifact@v4
        with:
          name: isolation-image
          path: /tmp/isolation-image.tar.gz
          retention-days: 1

  build-lumyn-sandbox-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Lumyn base image
        uses: ./.github/actions/resolve-lumyn-base-image

      - name: Build Lumyn production image
        run: docker build -f agents/lumyn/Dockerfile --build-arg BASE_IMAGE=${{ env.LUMYN_BASE_IMAGE }} -t vyrex-lumyn-production .

      - name: Verify sandbox user can read copied files
        run: |
          set -euo pipefail
          docker run --rm --user sandbox vyrex-lumyn-production \
            test -r /opt/vyrex-generate-config.ts
          docker run --rm --user sandbox vyrex-lumyn-production \
            test -r /opt/vyrex-lumyn-plugin/plugin.yaml
          docker run --rm --user sandbox vyrex-lumyn-production \
            test -r /opt/vyrex-blueprint/blueprint.yaml
          docker run --rm --user sandbox vyrex-lumyn-production \
            test -x /usr/local/bin/vyrex-decode-proxy
          docker run --rm --user sandbox vyrex-lumyn-production \
            test -x /usr/local/bin/vyrex-start

  build-sandbox-images-arm64:
    if: inputs.run_arm64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve sandbox base image
        uses: ./.github/actions/resolve-sandbox-base-image

      - name: Build production image on arm64
        run: docker build --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} -t vyrex-production-arm64 .

      - name: Build sandbox test image on arm64
        run: docker build -f test/Dockerfile.sandbox --build-arg BASE_IMAGE=vyrex-production-arm64 -t vyrex-sandbox-test-arm64 .

  test-e2e-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-sandbox-images
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: sandbox-test-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/sandbox-test-image.tar.gz | docker load

      - name: Run sandbox E2E tests
        run: docker run --rm -v "${{ github.workspace }}/test:/opt/test" vyrex-sandbox-test /opt/test/e2e-test.sh

  test-e2e-gateway-isolation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-sandbox-images
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: isolation-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/isolation-image.tar.gz | docker load

      - name: Run gateway isolation E2E tests
        run: VYREX_TEST_IMAGE=vyrex-production bash test/e2e-gateway-isolation.sh

  test-e2e-port-overrides:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-sandbox-images
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: isolation-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/isolation-image.tar.gz | docker load

      - name: Run port override E2E tests
        run: VYREX_TEST_IMAGE=vyrex-production bash test/e2e-port-overrides.sh
