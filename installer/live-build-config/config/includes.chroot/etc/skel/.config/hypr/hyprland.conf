# PradyOS Hyprland Config — macOS aesthetic

monitor=,preferred,auto,1

exec-once = hyprpaper
exec-once = waybar
exec-once = nwg-dock -d -i 48 -mb 8 -ml 8 -mr 8 -nolauncher
exec-once = dunst
exec-once = /usr/local/bin/kryos-firstboot-check

input {
  kb_layout = us
  follow_mouse = 1
  touchpad { natural_scroll = true }
}

general {
  gaps_in = 6
  gaps_out = 14
  border_size = 1
  col.active_border = rgba(ffffffff) rgba(ffffff88) 45deg
  col.inactive_border = rgba(44444444)
  layout = dwindle
}

decoration {
  rounding = 12
  blur {
    enabled = true
    size = 8
    passes = 2
    vibrancy = 0.1696
  }
  drop_shadow = true
  shadow_range = 20
  shadow_render_power = 3
  col.shadow = rgba(00000033)
}

animations {
  enabled = true
  bezier = macOS, 0.25, 0.46, 0.45, 0.94
  animation = windows, 1, 5, macOS, slide
  animation = windowsOut, 1, 4, macOS, slide
  animation = fade, 1, 4, macOS
  animation = workspaces, 1, 5, macOS, slidevert
}

dwindle {
  pseudotile = true
  preserve_split = true
}

gestures { workspace_swipe = true }

# Keybinds
$mod = SUPER
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, F, fullscreen
bind = $mod, SPACE, exec, rofi -show drun
bind = $mod, Return, exec, foot
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
