# Phase 33: Production ISO Build — Buildroot-based CI
name: Build Prady OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install buildroot dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev bison flex libssl-dev libelf-dev \
            wget rsync bc cpio unzip python3 python3-pip

      - name: Install GRUB tools
        run: |
          sudo apt-get install -y \
            grub-pc-bin grub-efi-amd64-bin xorriso squashfs-tools mtools

      - name: Install Python test dependencies
        run: pip3 install pytest pyyaml

      - name: Install Pillow for background generation
        run: pip3 install Pillow

      - name: Run Phase 33 tests (fast, no ISO build)
        run: python -m pytest build/iso/tests/ -W error::DeprecationWarning -q

      - name: Validate production compose
        run: docker compose -f build/iso/docker-compose.prod.yml config --quiet

      - name: Build ISO
        run: SIGN_ISO=1 make -C build/iso iso-fast

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: prady-os-iso
          path: |
            output/prady-os.iso
            output/prady-os.sha256
            output/release-checksums.txt
            output/prady-os.iso.sig
          retention-days: 7

      - name: Post SHA256 summary
        run: |
          if [ -f output/prady-os.iso ]; then
            SHA256=$(sha256sum output/prady-os.iso | awk '{print $1}')
            echo "## Prady OS ISO Build" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| SHA256 | \`${SHA256}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| ISO | prady-os.iso |" >> $GITHUB_STEP_SUMMARY
            echo "| Phase | 38/38 |" >> $GITHUB_STEP_SUMMARY
            if [ -f output/prady-os.iso.sig ]; then
              echo "| Signature | prady-os.iso.sig |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ISO not found (build may have been skipped)"
          fi

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-iso
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: prady-os-iso
          path: output

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/prady-os.iso
            output/prady-os.sha256
            output/release-checksums.txt
            output/prady-os.iso.sig

  # Future phases that extend this workflow will add jobs below
  # Phase 38: Sign ISO (sbsign + GPG)

  # DEAD CODE BELOW — live-build approach replaced by Buildroot in Phase 33
  # Preserved for reference only; this job is never triggered.
  _legacy-live-build-ref:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Shim isohybrid (not needed for CI artifact)
        run: |
          # live-build calls isohybrid after genisoimage to create a hybrid-boot ISO.
          # On Ubuntu 24.04 runners isohybrid is not available; shim it so build succeeds.
          printf '#!/bin/sh\necho "isohybrid shim: CI only"\nexit 0\n' | sudo tee /usr/bin/isohybrid > /dev/null
          sudo chmod +x /usr/bin/isohybrid

      - name: Disable live-build syslinux stage
        run: |
          # Ubuntu's live-build fork invokes a syslinux stage that is brittle in CI.
          # Force GRUB-only image generation by making syslinux helper scripts no-op.
          mapfile -t SYSLINUX_SCRIPTS < <(find /usr -type f \( -name "lb_binary_syslinux" -o -name "binary_syslinux" \) 2>/dev/null)
          if [ "${#SYSLINUX_SCRIPTS[@]}" -eq 0 ]; then
            echo "ERROR: could not find live-build syslinux helper scripts"
            exit 1
          fi
          for script in "${SYSLINUX_SCRIPTS[@]}"; do
            echo "Disabling $script"
            sudo cp "$script" "$script.bak"
            printf '#!/bin/sh\nexit 0\n' | sudo tee "$script" >/dev/null
            sudo chmod +x "$script"
          done

      - name: Stage syslinux assets
        run: |
          # The Ubuntu live-build lb_binary_syslinux script expects syslinux files at /root/isolinux/.
          # Pre-populate that directory from the installed Ubuntu packages so the build doesn't fail.
          sudo mkdir -p /root/isolinux
          # Locate a real, readable isolinux.bin (prefer package file lists; fallback to filesystem search).
          echo "Searching for isolinux.bin under /usr..."
          ISOLINUX_BIN=""
          for candidate in $(dpkg -L isolinux 2>/dev/null | grep -E '/isolinux\.bin$' || true); do
            if [ -f "$candidate" ]; then
              ISOLINUX_BIN="$candidate"
              break
            fi
          done
          if [ -z "$ISOLINUX_BIN" ]; then
            while IFS= read -r candidate; do
              if [ -f "$candidate" ]; then
                ISOLINUX_BIN="$candidate"
                break
              fi
            done < <(find /usr -type f -name "isolinux.bin" 2>/dev/null)
          fi
          echo "Found isolinux.bin at: ${ISOLINUX_BIN:-<not found>}"
          if [ -n "$ISOLINUX_BIN" ]; then
            sudo cp "$ISOLINUX_BIN" /root/isolinux/
            sudo test -f /root/isolinux/isolinux.bin
          else
            echo "ERROR: isolinux.bin not found or not readable; cannot continue"
            exit 1
          fi
          # Copy all .c32 modules (from syslinux-common → /usr/lib/syslinux/modules/bios/)
          find /usr/lib/syslinux -type f -name "*.c32" 2>/dev/null | while read -r f; do sudo cp "$f" /root/isolinux/; done
          echo "Staged files in /root/isolinux/:"
          sudo find /root/isolinux -type f -printf "%f\n"

      - name: Inject isolinux files into includes.binary
        run: |
          # Ensure genisoimage sees isolinux/boot catalog paths in the final image tree.
          sudo mkdir -p iso-build/config/includes.binary/isolinux
          sudo cp /root/isolinux/isolinux.bin iso-build/config/includes.binary/isolinux/
          sudo cp /root/isolinux/vesamenu.c32 iso-build/config/includes.binary/isolinux/
          sudo chown -R "$USER":"$USER" iso-build/config/includes.binary/isolinux
          ls -l iso-build/config/includes.binary/isolinux

      - name: Build ISO
        working-directory: iso-build
        run: sudo make build

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: prady-os-iso
          path: iso-build/prady-os.iso
          retention-days: 7
